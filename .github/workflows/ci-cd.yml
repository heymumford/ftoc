name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: maven

    - name: Build and test
      run: mvn -B package jacoco:report

    - name: Check coverage threshold
      run: |
        mvn jacoco:check || {
          echo "::warning::Coverage below threshold"
          exit 1
        }

    - name: Run Karate tests
      run: mvn verify -Dtest=karate.KarateRunner#testParallel

    - name: Version consistency check
      run: |
        POM_VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
        JAR_PATH=$(find target -name "ftoc-*jar-with-dependencies.jar" | head -1)
        JAR_VERSION=$(java -jar "$JAR_PATH" --version | grep -o '[0-9]\+\.[0-9]\+\.[0-9]\+')
        if [ "$POM_VERSION" != "$JAR_VERSION" ]; then
          echo "::error::Version mismatch: pom=$POM_VERSION jar=$JAR_VERSION"
          exit 1
        fi

    - name: Upload test reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-reports
        path: target/surefire-reports/*.xml

    - name: Upload coverage report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: jacoco-report
        path: target/site/jacoco/
