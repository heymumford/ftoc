# Configuration focusing on threshold adjustments
warnings:
  severity:
    EXCESSIVE_TAGS: error
    LONG_SCENARIO: error
    LONG_SCENARIO_NAME: error
    LONG_STEP_TEXT: error

# Custom threshold configuration
thresholds:
  maxSteps: 5
  minSteps: 3
  maxExamples: 3
  maxTags: 3
  maxScenarioNameLength: 50
  maxStepLength: 60
