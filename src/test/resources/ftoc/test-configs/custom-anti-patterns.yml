# Configuration focusing on anti-pattern customization
warnings:
  disabled:
    - CONJUNCTION_IN_STEP
    - AMBIGUOUS_PRONOUN

  severity:
    LONG_SCENARIO: error
    INCONSISTENT_TENSE: info
    CONJUNCTION_IN_STEP: info
    AMBIGUOUS_PRONOUN: info

  # Legacy enabled overrides
  antiPatterns:
    CONJUNCTION_IN_STEP:
      enabled: false
    AMBIGUOUS_PRONOUN:
      enabled: false

# Anti-pattern specific thresholds
thresholds:
  maxSteps: 8
  minSteps: 2
  maxScenarioNameLength: 80
  maxStepLength: 100
