# Custom warning configuration for testing
warnings:
  disabled:
    - DUPLICATE_TAG
    - AMBIGUOUS_TAG

  severity:
    MISSING_PRIORITY_TAG: error
    MISSING_TYPE_TAG: warning
    LOW_VALUE_TAG: info
    EXCESSIVE_TAGS: error
    TAG_TYPO: warning
    DUPLICATE_TAG: info
    LONG_SCENARIO: error
    TOO_FEW_STEPS: info
    MISSING_GIVEN: error
    MISSING_WHEN: error
    MISSING_THEN: error
    UI_FOCUSED_STEP: warning
    IMPLEMENTATION_DETAIL: warning

  # Legacy enabled overrides (for warnings that need explicit disable)
  tagQuality:
    DUPLICATE_TAG:
      enabled: false
  antiPatterns:
    TOO_FEW_STEPS:
      enabled: false

# Custom thresholds
thresholds:
  maxSteps: 12
  minSteps: 2
  maxTags: 5
  maxScenarioNameLength: 80
  maxStepLength: 100

# Custom tag definitions
tags:
  priority:
    - "@P0"
    - "@P1"
    - "@P2"
    - "@Critical"
    - "@High"
    - "@Medium"
    - "@Low"

  type:
    - "@UI"
    - "@API"
    - "@Backend"
    - "@Frontend"
    - "@Integration"
    - "@Unit"
    - "@Functional"
    - "@Acceptance"

  lowValue:
    - "@Test"
    - "@Temp"
    - "@ToDo"
    - "@TBD"
    - "@WIP"
