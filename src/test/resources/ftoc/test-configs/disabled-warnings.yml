# Configuration with many disabled warnings for testing
warnings:
  disabled:
    - MISSING_PRIORITY_TAG
    - EXCESSIVE_TAGS
    - LOW_VALUE_TAG
    - DUPLICATE_TAG
    - LONG_SCENARIO
    - UI_FOCUSED_STEP

  severity:
    MISSING_PRIORITY_TAG: info
    TAG_TYPO: error
    LONG_SCENARIO: info
    UI_FOCUSED_STEP: info

  # Legacy enabled overrides (for warnings that need explicit disable)
  tagQuality:
    MISSING_PRIORITY_TAG:
      enabled: false
    ORPHANED_TAG:
      enabled: true
  antiPatterns:
    LONG_SCENARIO:
      enabled: false
    UI_FOCUSED_STEP:
      enabled: false
    INCONSISTENT_TENSE:
      enabled: true

# Using default thresholds
thresholds:
  maxSteps: 10
  minSteps: 2
  maxTags: 6
