# FTOC Warning Configuration
# -----------------------
# Warnings default to enabled with severity "warning".
# Only list what differs from defaults.

warnings:
  # Disable specific warnings by name (no category needed)
  disabled:
    # - MISSING_PRIORITY_TAG  # Uncomment to disable specific warnings
    # - LONG_SCENARIO

  # Override severity for individual warnings (default: warning)
  severity:
    # Tag quality
    MISSING_PRIORITY_TAG: error
    MISSING_TYPE_TAG: warning
    LOW_VALUE_TAG: info
    ORPHANED_TAG: info
    DUPLICATE_TAG: error
    LONG_SCENARIO_NAME: info
    LONG_STEP_TEXT: info
    TOO_GENERIC_TAG: info
    # Anti-patterns
    MISSING_GIVEN: error
    MISSING_WHEN: error
    MISSING_THEN: error
    MISSING_EXAMPLES: error
    INCORRECT_STEP_ORDER: error

  # Standard alternatives for tag-related warnings
  standardAlternatives:
    MISSING_PRIORITY_TAG:
      - "@P0"
      - "@P1"
      - "@P2"
      - "@P3"
      - "@Critical"
      - "@High"
      - "@Medium"
      - "@Low"
    MISSING_TYPE_TAG:
      - "@UI"
      - "@API"
      - "@Backend"
      - "@Frontend"
      - "@Integration"
      - "@Unit"
      - "@Performance"
      - "@Security"
    LOW_VALUE_TAG:
      - "@Feature"
      - "@Scenario"
      - "@Test"
      - "@Temp"
    AMBIGUOUS_TAG:
      - "@UI"
      - "@API"
      - "@P0"
      - "@P1"

# Custom tag definitions
tags:
  priority:
    - "@P0"
    - "@P1"
    - "@P2"
    - "@P3"
    - "@Critical"
    - "@High"
    - "@Medium"
    - "@Low"

  type:
    - "@UI"
    - "@API"
    - "@Backend"
    - "@Frontend"
    - "@Integration"
    - "@Unit"
    - "@Performance"
    - "@Security"
    - "@Regression"
    - "@Smoke"
    - "@E2E"
    - "@Functional"
    - "@Acceptance"
    - "@System"
    - "@Component"

  status:
    - "@WIP"
    - "@Ready"
    - "@Review"
    - "@Flaky"
    - "@Deprecated"
    - "@Legacy"
    - "@Todo"
    - "@Debug"
    - "@InProgress"
    - "@Completed"
    - "@Blocked"

  lowValue:
    - "@Test"
    - "@Tests"
    - "@Feature"
    - "@Cucumber"
    - "@Scenario"
    - "@Gherkin"
    - "@Temp"
    - "@Temporary"
    - "@Pending"
    - "@Fixme"
    - "@Workaround"
    - "@Ignore"
    - "@Skip"
    - "@Manual"

# Threshold configurations
thresholds:
  maxSteps: 10
  minSteps: 2
  minExamples: 2
  maxTags: 6
  maxScenarioNameLength: 100
  maxStepLength: 120
